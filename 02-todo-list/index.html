<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 3 - To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <h2>To-Do List</h2>
        
        <!-- Bagian Input dan Tombol -->
        <div class="input-section">
            <input type="text" id="input-tugas" placeholder="Tulis tugas baru di sini...">
            <button id="btn-tambah" class="btn">Tambah</button>
        </div>

        <!-- Wadah Tempat List Tugas Muncul -->
        <ul id="daftar-tugas">
            <!-- Elemen <li> akan disuntikkan lewat JavaScript di sini -->
        </ul>
    </div>

    <div id="toast-container"></div>

    <div id="edit-modal" class="modal-overlay">
        <div class="modal-content">
            <h3>Edit Tugas Kamu</h3>
            <input type="text" id="input-modal-edit" placeholder="Ubah nama tugas...">
            <div class="modal-buttons">
                <button id="btn-modal-batal" class="btn-small btn-batal">Batal</button>
                <button id="btn-modal-simpan" class="btn-small btn-simpan">Simpan Perubahan</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
