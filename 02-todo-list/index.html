<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 3 - To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <h2>To-Do List</h2>
        
        <!-- Bagian Input dan Tombol -->
        <div class="input-section">
            <input type="text" id="input-tugas" placeholder="Tulis tugas baru di sini...">
            <button id="btn-tambah" class="btn">Tambah</button>
        </div>

        <!-- Wadah Tempat List Tugas Muncul -->
        <ul id="daftar-tugas">
            <!-- Elemen <li> akan disuntikkan lewat JavaScript di sini -->
        </ul>
    </div>

    <div id="toast-container"></div>
    
    <script src="script.js"></script>
</body>
</html>
