<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>clock-sotpwatch</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <div>
            <h2>Jam Digital</h2>
            <h1 id="tampilan-jam" class="tampilan-jam">00:00:00</h1>
        </div>

        <hr>

        <div>
            <h2>Stopwatch</h2>
            <h1 id="tampilan-stopwatch" class="tampilan-stopwatch">00:00:00</h1>
        </div>
    </div> 

    <div class="button-container">
        <button id="btn-start" class="btn">Start</button>
        <button id="btn-stop" class="btn">Stop</button>
        <button id="btn-reset" class="btn">Reset</button>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
